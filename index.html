<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connectify — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Animated background bubbles ── -->
  <div class="scene" id="bubbleScene" aria-hidden="true"></div>



  <!-- ── Main card ── -->
  <main class="card-wrapper">
    <div class="glass-card">

      <!-- Logo -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="18" r="7" stroke="Blue" stroke-width="2.2" />
            <circle cx="24" cy="18" r="7" stroke="Grey" stroke-width="2.2" />
            <path d="M17.5 12.8C19.2 14.2 20.3 16 20.3 18s-1.1 3.8-2.8 5.2" stroke="rgba(255,255,255,0.8)"
              stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </div>
        <span class="brand-name">Connectify</span>
      </div>

      <!-- Tab switcher -->
      <div class="tab-bar" role="tablist">
        <button class="tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login"
          data-target="login">Sign In</button>
        <button class="tab" id="tab-signup" role="tab" aria-selected="false" aria-controls="panel-signup"
          data-target="signup">Create Account</button>
        <span class="tab-indicator" aria-hidden="true"></span>
      </div>

      <!-- ── LOGIN PANEL ── -->
      <div class="panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
        <p class="panel-subtitle">Welcome Back</p>

        <div class="field-group">
          <label class="field-label" for="login-email">Email</label>
          <div class="input-shell" id="email-shell-login">
            <div class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5" />
                <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </div>
            <input type="text" id="login-email" class="text-input" placeholder="username" autocomplete="email"
              spellcheck="false" />
            <span class="domain-suffix" aria-hidden="true">@silicon.ac.in</span>
          </div>
        </div>

        <div class="field-group">
          <div class="label-row">
            <label class="field-label" for="login-password">Password</label>
            <button type="button" class="forgot-link" tabindex="0">Forgot password?</button>
          </div>
          <div class="input-shell" id="pass-shell-login">
            <div class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
                <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </div>
            <input type="password" id="login-password" class="text-input password-input" placeholder=""
              autocomplete="current-password" />
            <button type="button" class="eye-toggle" data-target="login-password"
              aria-label="Toggle password visibility">
              <svg class="eye-open" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5" />
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5" />
              </svg>
              <svg class="eye-closed hidden" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3l14 14M8.5 8.6a2.5 2.5 0 003.4 3.4M1 10s3.5-6 9-6c1.5 0 2.9.4 4.1 1M19 10s-1.2 1.9-3.1 3.4"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>

        <button type="button" class="cta-btn" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-shine" aria-hidden="true"></span>
        </button>


      </div>

      <!-- ── SIGNUP PANEL ── -->
      <div class="panel" id="panel-signup" role="tabpanel" aria-labelledby="tab-signup">
        <p class="panel-subtitle">Join Connectify. Your campus network awaits.</p>

        <div class="name-row">
          <div class="field-group">
            <label class="field-label" for="signup-fname">First Name</label>
            <div class="input-shell">
              <div class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5" />
                  <path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" />
                </svg>
              </div>
              <input type="text" id="signup-fname" class="text-input" placeholder="First" autocomplete="given-name" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label" for="signup-lname">Last Name</label>
            <div class="input-shell">
              <input type="text" id="signup-lname" class="text-input" placeholder="Last" style="padding-left:1rem"
                autocomplete="family-name" />
            </div>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="signup-email">Email</label>
          <div class="input-shell" id="email-shell-signup">
            <div class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5" />
                <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </div>
            <input type="text" id="signup-email" class="text-input" placeholder="username" autocomplete="off"
              spellcheck="false" />
            <span class="domain-suffix" aria-hidden="true">@silicon.ac.in</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="signup-password">Password</label>
          <div class="input-shell" id="pass-shell-signup">
            <div class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
                <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </div>
            <input type="password" id="signup-password" class="text-input password-input" placeholder="Create password"
              autocomplete="new-password" />
            <button type="button" class="eye-toggle" data-target="signup-password"
              aria-label="Toggle password visibility">
              <svg class="eye-open" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5" />
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5" />
              </svg>
              <svg class="eye-closed hidden" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 3l14 14M8.5 8.6a2.5 2.5 0 003.4 3.4M1 10s3.5-6 9-6c1.5 0 2.9.4 4.1 1M19 10s-1.2 1.9-3.1 3.4"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </button>
          </div>
          <!-- Strength bar -->
          <div class="strength-bar" id="strength-bar" aria-label="Password strength">
            <div class="strength-seg" data-index="0"></div>
            <div class="strength-seg" data-index="1"></div>
            <div class="strength-seg" data-index="2"></div>
            <div class="strength-seg" data-index="3"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>

        <div class="field-group">
          <label class="field-label" for="signup-confirm">Confirm Password</label>
          <div class="input-shell" id="confirm-shell">
            <div class="input-icon">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 10l4 4 6-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>
            <input type="password" id="signup-confirm" class="text-input password-input" placeholder="Re-enter password"
              autocomplete="new-password" />
          </div>
          <span class="match-hint" id="match-hint"></span>
        </div>

        <button type="button" class="cta-btn" id="signup-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-shine" aria-hidden="true"></span>
        </button>

        <p class="terms-note">By signing up you agree to our <a href="#" class="terms-link">Terms of Service</a> &amp;
          <a href="#" class="terms-link">Privacy Policy</a>.
        </p>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="script.js"></script>
</body>

</html>
